name: Publish Helm Chart

# Publishes the DeerFlow Helm chart as an OCI artifact to GHCR alongside the
# container images (see container.yaml). Triggers on the same `v*` tags.
#
# Users then install with:
#   helm install deer-flow oci://ghcr.io/${{ owner }}/deer-flow --version <ver>

on:
  push:
    tags:
      - "v*"

jobs:
  publish-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ubuntu-latest ships with helm 3 preinstalled — no setup-helm action needed.

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Verify chart version matches tag
        run: |
          CHART_VERSION=$(helm show chart deploy/helm/deer-flow | awk '/^version:/ {print $2}')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Chart version: $CHART_VERSION"
          echo "Tag version:    $TAG_VERSION"
          if [ "$CHART_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Chart version ($CHART_VERSION) does not match git tag ($GITHUB_REF_NAME). Bump Chart.yaml's version to $TAG_VERSION before tagging."
            exit 1
          fi

      - name: Package chart
        run: helm package deploy/helm/deer-flow --destination ./packages

      - name: Push chart to GHCR
        run: |
          for pkg in ./packages/*.tgz; do
            echo "--- pushing $pkg"
            helm push "$pkg" oci://ghcr.io/${{ github.repository_owner }}
          done
